name: Deploy Sanity Studio

on:
  push:
    branches: [main]
    paths:
      - 'sanity.config.ts'
      - 'sanity.cli.ts'
      - 'schemas/**'
  workflow_dispatch:

jobs:
  deploy-studio:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Sanity Studio
        run: |
          if [ -n "$SANITY_AUTH_TOKEN" ] && [ -n "$SANITY_PROJECT_ID" ]; then
            bunx sanity deploy --yes
          else
            echo "SANITY_AUTH_TOKEN or SANITY_PROJECT_ID not configured — skipping studio deploy"
          fi
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_TOKEN }}
          SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          SANITY_DATASET:    ${{ secrets.PUBLIC_SANITY_DATASET }}
